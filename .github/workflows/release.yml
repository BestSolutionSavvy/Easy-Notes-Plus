name: Release

on:
    push:
        branches:
            - release

jobs:
    release:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install dependencies
              run: pnpm install

            - name: Build and create dist
              run: pnpm run dist

            - name: Get commit message
              id: commit_message
              run: |
                  $commit_msg = git log -1 --pretty=%B
                  echo "message=$commit_msg" >> $env:GITHUB_OUTPUT
              shell: powershell

            - name: Get version from package.json
              id: version
              run: |
                  $package = Get-Content 'package.json' | ConvertFrom-Json
                  $version = $package.version
                  echo "number=$version" >> $env:GITHUB_OUTPUT
              shell: powershell

            - name: Rename files (replace spaces with hyphens)
              run: |
                  cd dist
                  $version = "${{ steps.version.outputs.number }}"

                  # Rename main installer
                  if (Test-Path "Easy Notes Plus Setup $version.exe") {
                    Rename-Item "Easy Notes Plus Setup $version.exe" "Easy-Notes-Plus-Setup-$version.exe"
                  }

                  # Rename blockmap
                  if (Test-Path "Easy Notes Plus Setup $version.exe.blockmap") {
                    Rename-Item "Easy Notes Plus Setup $version.exe.blockmap" "Easy-Notes-Plus-Setup-$version.exe.blockmap"
                  }

                  # latest.yml stays as is
                  Get-ChildItem
              shell: powershell

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.number }}
                  body: ${{ steps.commit_message.outputs.message }}
                  files: |
                      dist/Easy-Notes-Plus-Setup-${{ steps.version.outputs.number }}.exe
                      dist/Easy-Notes-Plus-Setup-${{ steps.version.outputs.number }}.exe.blockmap
                      dist/latest.yml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
